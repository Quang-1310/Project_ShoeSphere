spring.application.name=ShoeSphere

#Config datasource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/shoe_sphere?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

#@Config jpa
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

#Config logging
#logging.file.name=logs/application.log
#logging.pattern.console=%d{yyyy-MM-dd hh:mm:ss.SSS} -  %highlight(%-5level) - %cyan(%logger{50}) - %green(%msg%n)
#logging.logback.rollingpolicy.max-file-size=20MB
#logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.ra.demo = INFO

#Config jwt
jwt-secret = ${JWT_SECRET}
#15'
jwt-expired = 900000
# 30 ng‡y
jwt-refresh-expired = 2592000000

#Config cloudinary
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

# Config file
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

#Config redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=